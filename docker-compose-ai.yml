version: '3.8'

services:
  qms-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./queue.db:/app/queue.db
    environment:
      - DATABASE_URL=sqlite:////app/queue.db
    depends_on:
      - qms-ai-service

  qms-ai-service:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./queue.db:/app/queue.db
      - ./ai_service/models_store:/app/ai_service/models_store
    environment:
      - DATABASE_URL=sqlite:////app/queue.db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - qms-api
