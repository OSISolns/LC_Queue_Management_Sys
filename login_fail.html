    <script type="text/javascript" language="javascript">
        function setFocus() {
            user = document.getElementById('txtUserName');
            user.focus();
        }
        function BrowserType() {
            var browser = navigator.userAgent.toLowerCase().indexOf('chrome') > -1;
            if (browser == false) {
                document.getElementById("divBrowser").style.display = 'Block';
            }
        }
        function validate() {
            user = document.getElementById('txtUserName');
            pass = document.getElementById('txtPassword');

            if (trim(user.value) == '' || trim(pass.value) == '') {
                alert('Please enter the user name and password');

                if (trim(user.value) == '')
                    user.focus();
                else if (trim(pass.value) == '')
                    pass.focus();

                return false;
            }

            return true;
        }
        function checkCapsLock(e) {
            var myKeyCode = 0;
            var myShiftKey = false;
            //var myMsg = 'Caps Lock is On.\n\nTo prevent entering your password incorrectly,\nyou should press Caps Lock to turn it off.';
            var CapsOn = false;

            // Internet Explorer 4+
            if (document.all) {
                myKeyCode = e.keyCode;
                myShiftKey = e.shiftKey;

                // Netscape 4
            } else if (document.layers) {
                myKeyCode = e.which;
                if (e.shiftKey)
                    myShiftKey = e.shiftKey
                else
                    myShiftKey = (myKeyCode == 16) ? true : false;

                // Netscape 6, Mozilla, Chrome
            } else if (document.getElementById) {
                myKeyCode = e.which;
                if (e.shiftKey)
                    myShiftKey = e.shiftKey
                else
                    myShiftKey = (myKeyCode == 16) ? true : false;
            }

            // Upper case letters are seen without depressing the Shift key, therefore Caps Lock is on
            if ((myKeyCode >= 65 && myKeyCode <= 90) && !myShiftKey) {
                CapsOn = true;

                // Lower case letters are seen while depressing the Shift key, therefore Caps Lock is on
            }
            else if ((myKeyCode >= 97 && myKeyCode <= 122) && myShiftKey) {
                CapsOn = true;
            }
            var oMsg = document.getElementById('spnCapsMsg');
            oMsg.style.visibility = (CapsOn ? 'visible' : 'hidden');
        }

        function Get_Mac() {
            alert('');
            var m = document.execCommand('Getmac');
        }
